<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAAG - Conservation Technology Network</title>
    <style>
        :root {
            --brand-700: #1f6a34;
            --brand-600: #2c7a3f;
            --brand-500: #3e8e52;
            --brand-400: #4a9d5f;
            --brand-100: #e8f4ea;
            --accent-500: #ff6b35;
            --surface: #ffffff;
            --text-900: #1f2937;
            --text-700: #374151;
            --text-600: #4b5563;
            --text-500: #6b7280;
            --ring: 0 0 0 4px rgba(44, 122, 63, 0.12);
            --shadow-sm: 0 2px 12px rgba(31, 106, 52, 0.08);
            --shadow-md: 0 8px 24px rgba(31, 106, 52, 0.12);
            --shadow-lg: 0 16px 40px rgba(31, 106, 52, 0.16);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
            background:
              radial-gradient(1200px 800px at 10% -10%, rgba(76, 175, 80, 0.08), transparent 40%),
              radial-gradient(1000px 600px at 110% 10%, rgba(34, 197, 94, 0.08), transparent 50%),
              linear-gradient(135deg, #f8fdf9 0%, #eef8f0 100%);
            line-height: 1.6;
            color: var(--text-900);
            min-height: 100vh;
        }

        /* Scrollbar (non-intrusive) */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--brand-400), var(--brand-600));
            border-radius: 999px;
        }

        .header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: saturate(120%) blur(10px);
            padding: 18px 0;
            border-bottom: 1px solid var(--brand-100);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, var(--brand-700), var(--brand-400));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 6px;
        }

        .nav-link {
            position: relative;
            color: var(--brand-700);
            text-decoration: none;
            font-weight: 600;
            padding: 10px 14px;
            border-radius: 10px;
            transition: transform 0.2s ease;
        }
        .nav-link::after {
            content: "";
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 6px;
            height: 2px;
            background: linear-gradient(90deg, var(--brand-400), var(--brand-600));
            border-radius: 2px;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 220ms ease;
        }
        .nav-link:hover::after, .nav-link.active::after { transform: scaleX(1); }
        .nav-link:hover { transform: translateY(-1px); }

        .main-content {
            display: flex;
            gap: 32px;
            margin-top: 28px;
        }

        .content-area { flex: 1; }

        .sidebar {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .view-toggles {
            display: flex;
            background: var(--surface);
            border-radius: calc(var(--radius) - 6px);
            padding: 6px;
            gap: 6px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 18px;
            border: 1px solid var(--brand-100);
        }

        .toggle-btn {
            flex: 1;
            padding: 12px 14px;
            background: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.18s ease;
            color: var(--text-600);
        }
        .toggle-btn:hover { background: rgba(44, 122, 63, 0.08); }
        .toggle-btn.active {
            background: linear-gradient(135deg, var(--brand-600), var(--brand-400));
            color: white;
            box-shadow: 0 6px 18px rgba(44,122,63,0.25);
        }

        .search-bar {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 22px;
            border: 1px solid var(--brand-100);
        }

        .search-bar input {
            width: 100%;
            padding: 16px 22px;
            font-size: 1rem;
            border: 2px solid var(--brand-100);
            border-radius: 999px;
            outline: none;
            transition: all 0.18s ease;
            background: linear-gradient(0deg, #ffffff, #ffffff) padding-box,
                        linear-gradient(90deg, var(--brand-400), var(--brand-600)) border-box;
            border: 2px solid transparent;
        }

        .search-bar input:focus {
            box-shadow: var(--ring);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 22px;
        }

        .item-card {
            position: relative;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 22px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease;
            cursor: pointer;
            border: 1px solid rgba(44,122,63,0.10);
            isolation: isolate;
        }
        /* Gradient border ring */
        .item-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(44,122,63,0.35), rgba(74,157,95,0.15));
            -webkit-mask:
              linear-gradient(#000 0 0) content-box,
              linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
                    mask-composite: exclude;
            pointer-events: none;
            opacity: 0.65;
        }
        .item-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }

        .item-header {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            gap: 14px;
        }

        .item-icon {
            width: 58px;
            height: 58px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--brand-600), var(--brand-400));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.35rem;
            font-weight: 700;
            flex-shrink: 0;
            box-shadow: inset 0 -6px 12px rgba(0,0,0,0.12);
        }

        .item-info h3 {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--brand-700);
            margin-bottom: 2px;
            letter-spacing: 0.2px;
        }

        .item-info p {
            color: var(--text-500);
            font-size: 0.92rem;
        }

        .item-description {
            color: var(--text-700);
            margin: 10px 0 16px;
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tag {
            background: linear-gradient(135deg, var(--brand-600), var(--brand-400));
            color: white;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.16s ease, filter 0.16s ease;
            letter-spacing: 0.15px;
            box-shadow: 0 6px 14px rgba(44,122,63,0.18);
            border: 1px solid rgba(255,255,255,0.35);
        }
        .tag:hover { transform: translateY(-1px); filter: brightness(1.05); }

        .item-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 14px;
            border-top: 1px solid #eef2f3;
        }

        .stats {
            display: flex;
            gap: 16px;
        }

        .stat {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-600);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--brand-600), var(--brand-400));
            color: white;
            padding: 10px 16px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.92rem;
            transition: transform 0.16s ease, filter 0.16s ease, box-shadow 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 18px rgba(44,122,63,0.22);
        }
        .action-btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
        .action-btn:focus-visible { outline: none; box-shadow: var(--ring); }

        .sidebar-section, .leaderboard, .user-profile {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 22px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(44,122,63,0.10);
        }

        .sidebar-section h3, .leaderboard h3 {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--brand-700);
            margin-bottom: 12px;
            letter-spacing: 0.2px;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .loading {
            text-align: center;
            padding: 60px 0;
            color: var(--text-600);
        }

        .spinner {
            width: 42px;
            height: 42px;
            border: 4px solid var(--brand-100);
            border-left: 4px solid var(--brand-600);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 14px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Badge / Profile polish */
        .profile-header { display: flex; align-items: center; margin-bottom: 16px; gap: 16px; }
        .profile-avatar {
            width: 76px; height: 76px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--brand-400), var(--brand-600));
            display: grid; place-items: center; color: white; font-size: 1.8rem; font-weight: 800;
            box-shadow: inset 0 -8px 16px rgba(0,0,0,0.18);
        }
        .profile-info h2 { color: var(--brand-700); font-size: 1.25rem; margin-bottom: 4px; }
        .profile-info p { color: var(--text-600); margin-bottom: 6px; }
        .profile-level {
            background: linear-gradient(135deg, var(--accent-500), #ff8c42);
            color: white; padding: 4px 10px; border-radius: 999px; font-size: 0.85rem; font-weight: 800;
            box-shadow: 0 8px 16px rgba(255,107,53,0.25);
        }

        .badges-section { margin-top: 14px; }
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .badge {
            display: flex; flex-direction: column; align-items: center;
            padding: 14px; border-radius: 14px;
            background: linear-gradient(135deg, #f8fdf9, #eef8f0);
            border: 1.5px solid var(--brand-100);
            transition: transform 0.16s ease, box-shadow 0.16s ease;
            position: relative;
        }
        .badge.earned {
            background: linear-gradient(135deg, var(--brand-600), var(--brand-400));
            color: white; border-color: transparent;
            box-shadow: 0 12px 20px rgba(44,122,63,0.25);
        }
        .badge.earned::after { content: '✨'; position: absolute; top: 6px; right: 8px; font-size: 0.8rem; }
        .badge-icon { font-size: 1.7rem; margin-bottom: 6px; }
        .badge-name { font-size: 0.82rem; font-weight: 800; text-align: center; line-height: 1.2; }
        .badge-progress { width: 100%; height: 4px; background: rgba(255,255,255,0.35); border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .badge-progress-fill { height: 100%; background: var(--accent-500); border-radius: 2px; transition: width 0.3s ease; }

        .leaderboard-item {
            display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #eef2f3;
        }
        .leaderboard-item:last-child { border-bottom: none; }
        .leaderboard-rank { font-size: 1.15rem; font-weight: 900; color: var(--brand-700); width: 30px; }
        .leaderboard-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--brand-400), var(--brand-600));
            display: grid; place-items: center; color: white; font-weight: 800; margin: 0 12px;
        }
        .leaderboard-info { flex: 1; }
        .leaderboard-name { font-weight: 800; color: var(--text-900); }
        .leaderboard-specialty { font-size: 0.8rem; color: var(--text-600); }
        .leaderboard-score { font-weight: 900; color: var(--brand-700); }

        @media (max-width: 1024px) {
            .container { max-width: 100%; }
            .sidebar { width: 100%; }
            .main-content { flex-direction: column; }
        }
        @media (max-width: 768px) {
            .items-grid { grid-template-columns: 1fr; gap: 18px; }
            .badges-grid { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
        }

        /* Accessibility */
        .nav-link:focus-visible, .toggle-btn:focus-visible, .tag:focus-visible, .action-btn:focus-visible {
            outline: none;
            box-shadow: var(--ring);
        }

        /* Dark mode (automatic) */
        @media (prefers-color-scheme: dark) {
            :root {
                --surface: #0f172a;
                --text-900: #f8fafc;
                --text-700: #e2e8f0;
                --text-600: #cbd5e1;
                --text-500: #94a3b8;
                --brand-100: rgba(44, 122, 63, 0.25);
                --shadow-sm: 0 2px 12px rgba(0,0,0,0.4);
                --shadow-md: 0 10px 30px rgba(0,0,0,0.5);
                --shadow-lg: 0 16px 48px rgba(0,0,0,0.6);
            }
            body {
                background:
                  radial-gradient(1200px 800px at 10% -10%, rgba(34,197,94,0.1), transparent 40%),
                  radial-gradient(1000px 600px at 110% 10%, rgba(34,197,94,0.06), transparent 50%),
                  linear-gradient(135deg, #0b1220, #0a111e 60%);
            }
            .header { background: rgba(15, 23, 42, 0.7); border-bottom-color: rgba(148,163,184,0.12); }
            .search-bar { border-color: rgba(148,163,184,0.15); }
            .item-stats { border-top-color: rgba(148,163,184,0.16); }
            .spinner { border-color: rgba(148,163,184,0.15); border-left-color: var(--brand-400); }
            .badge { border-color: rgba(148,163,184,0.18); background: linear-gradient(135deg, #0f172a, #111827); }
        }
    
</style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">HAAG</a>
                <nav class="nav-links">
                    <a href="#" class="nav-link" onclick="showView('posts')">Posts</a>
                    <a href="#" class="nav-link" onclick="showView('communities')">Communities</a>
                    <a href="#" class="nav-link" onclick="showView('profiles')">Researchers</a>
                    <a href="https://134.199.214.141" class="nav-link">Forum</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="main-content">
            <div class="content-area">
                <div class="view-toggles">
                    <button class="toggle-btn active" onclick="showView('posts')" id="posts-btn">📝 Posts</button>
                    <button class="toggle-btn" onclick="showView('communities')" id="communities-btn">🏛️ Communities</button>
                    <button class="toggle-btn" onclick="showView('profiles')" id="profiles-btn">👥 Researchers</button>
                </div>

                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search posts, communities, or researchers...">
                </div>

                <div id="loading" class="loading">
                    <div class="spinner"></div>
                    <p>Loading content...</p>
                </div>

                <div id="posts-view" class="items-grid" style="display: none;"></div>
                <div id="communities-view" class="items-grid" style="display: none;"></div>
                <div id="profiles-view" class="items-grid" style="display: none;"></div>
            </div>

            <div class="sidebar">
                <div class="sidebar-section">
                    <h3>🏷️ Popular Tags</h3>
                    <div class="tag-list" id="popularTags"></div>
                </div>

                <div class="leaderboard">
                    <h3>🏆 Research Leaders</h3>
                    <div id="leaderboard"></div>
                </div>

                <div class="sidebar-section">
                    <h3>🌟 Featured Researchers</h3>
                    <div id="featuredResearchers"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'http://134.199.214.141';
        
        let allPosts = [];
        let allCommunities = [];
        let currentView = 'posts';
        
        // Predefined conservation tags
        const conservationTags = [
            'camera-traps', 'machine-learning', 'acoustic-monitoring', 'wildlife-tracking',
            'biodiversity', 'habitat-restoration', 'species-identification', 'ecosystem-monitoring',
            'conservation-tech', 'field-research', 'data-analysis', 'remote-sensing',
            'ai-conservation', 'wildlife-corridors', 'endangered-species', 'climate-change',
            'forest-conservation', 'marine-biology', 'ornithology', 'mammalogy'
        ];

        // Badge definitions
        const badgeDefinitions = {
            'research-pioneer': { name: 'Research Pioneer', icon: '🔬', description: 'Started 5+ research discussions' },
            'data-analyst': { name: 'Data Analyst', icon: '📊', description: 'Posted 10+ data analysis insights' },
            'field-expert': { name: 'Field Expert', icon: '🌲', description: 'Shared field research experiences' },
            'tech-innovator': { name: 'Tech Innovator', icon: '💡', description: 'Contributed technology solutions' },
            'community-builder': { name: 'Community Builder', icon: '🤝', description: 'Active in 5+ communities' },
            'mentor': { name: 'Mentor', icon: '👨‍🏫', description: 'Helped 20+ researchers' },
            'conservation-hero': { name: 'Conservation Hero', icon: '🦋', description: 'Made significant conservation impact' },
            'ml-specialist': { name: 'ML Specialist', icon: '🤖', description: 'Machine learning expertise' },
            'progress-tracker': { name: 'Progress Tracker', icon: '📈', description: 'Research progress tracking specialist' },
            'gamification-expert': { name: 'Gamification Expert', icon: '🎮', description: 'Gamification and engagement specialist' }
        };

        // User profiles with specializations
        const researcherProfiles = [
            {
                id: 'dima',
                name: 'Dima',
                specialty: 'Research Progress Tracking',
                level: 'Expert',
                avatar: 'D',
                badges: ['research-pioneer', 'data-analyst', 'progress-tracker', 'mentor'],
                posts: 15,
                communities: 8,
                score: 1250,
                bio: 'Specializing in research progress tracking systems and methodology optimization for conservation projects.'
            },
            {
                id: 'leyang',
                name: 'Leyang',
                specialty: 'Gamification & Engagement',
                level: 'Expert', 
                avatar: 'L',
                badges: ['tech-innovator', 'community-builder', 'gamification-expert', 'ml-specialist'],
                posts: 12,
                communities: 6,
                score: 1100,
                bio: 'Expert in gamification systems and user engagement strategies for scientific communities.'
            },
            {
                id: 'jamesthesnake',
                name: 'jamesthesnake',
                specialty: 'Conservation Technology',
                level: 'Admin',
                avatar: 'J',
                badges: ['research-pioneer', 'tech-innovator', 'conservation-hero', 'community-builder'],
                posts: 3,
                communities: 3,
                score: 950,
                bio: 'Conservation technology researcher focusing on AI applications in wildlife monitoring.'
            }
        ];

        async function loadData() {
            try {
                // Load posts
                const postsResponse = await fetch(`${API_BASE}/api/v3/post/list?limit=50`);
                const postsData = await postsResponse.json();
                allPosts = postsData.posts || [];

                // Load communities  
                const communitiesResponse = await fetch(`${API_BASE}/api/v3/community/list?limit=50`);
                const communitiesData = await communitiesResponse.json();
                allCommunities = communitiesData.communities || [];

                displayContent();
                setupSearch();
                displaySidebar();
            } catch (error) {
                console.error('Error loading data:', error);
                showError('Failed to load content. Please try again later.');
            }
        }

        function extractTags(text) {
            if (!text) return [];
            const words = text.toLowerCase().split(/[\\s,.-]+/);
            return conservationTags.filter(tag => 
                words.some(word => word.includes(tag) || tag.includes(word))
            );
        }

        function showView(view) {
            currentView = view;
            
            // Update button states
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`${view}-btn`).classList.add('active');
            
            // Update nav links
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            
            displayContent();
        }

        function displayContent() {
            const loading = document.getElementById('loading');
            const postsView = document.getElementById('posts-view');
            const communitiesView = document.getElementById('communities-view');
            const profilesView = document.getElementById('profiles-view');
            
            // Hide all views
            postsView.style.display = 'none';
            communitiesView.style.display = 'none';
            profilesView.style.display = 'none';
            loading.style.display = 'none';
            
            if (currentView === 'posts') {
                displayPosts();
                postsView.style.display = 'grid';
            } else if (currentView === 'communities') {
                displayCommunities();
                communitiesView.style.display = 'grid';
            } else if (currentView === 'profiles') {
                displayProfiles();
                profilesView.style.display = 'grid';
            }
        }

        function displayPosts() {
            const container = document.getElementById('posts-view');
            container.innerHTML = '';
            
            allPosts.forEach(item => {
                const post = item.post;
                const creator = item.creator;
                const community = item.community;
                const counts = item.counts;
                
                const tags = extractTags(`${post.name} ${post.body || ''}`);
                
                const card = document.createElement('div');
                card.className = 'item-card';
                card.onclick = () => window.open(`${API_BASE}/post/${post.id}`, '_blank');
                
                card.innerHTML = `
                    <div class="item-header">
                        <div class="item-icon">${post.name.charAt(0).toUpperCase()}</div>
                        <div class="item-info">
                            <h3>${post.name}</h3>
                            <p>by ${creator.name} in ${community.title || community.name}</p>
                        </div>
                    </div>
                    <div class="item-description">
                        ${post.body || 'Click to read more about this research post...'}
                    </div>
                    <div class="item-tags">
                        ${tags.map(tag => `<span class="tag" onclick="event.stopPropagation(); filterByTag('${tag}')">#${tag}</span>`).join('')}
                    </div>
                    <div class="item-stats">
                        <div class="stats">
                            <div class="stat">
                                <span>👍</span>
                                <span>${counts.score}</span>
                            </div>
                            <div class="stat">
                                <span>💬</span>
                                <span>${counts.comments}</span>
                            </div>
                        </div>
                        <button class="action-btn" onclick="event.stopPropagation(); window.open('${API_BASE}/post/${post.id}', '_blank')">
                            Read More
                        </button>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        function displayCommunities() {
            const container = document.getElementById('communities-view');
            container.innerHTML = '';
            
            allCommunities.forEach((item, index) => {
                const community = item.community;
                const counts = item.counts;
                
                const card = document.createElement('div');
                card.className = `item-card ${index === 0 ? 'featured' : ''}`;
                card.onclick = () => window.open(`${API_BASE}/c/${community.name}`, '_blank');
                
                const iconLetter = community.title ? community.title.charAt(0).toUpperCase() : 'C';
                
                card.innerHTML = `
                    <div class="item-header">
                        <div class="item-icon">${iconLetter}</div>
                        <div class="item-info">
                            <h3>${community.title || community.name}</h3>
                            <p>@${community.name}</p>
                        </div>
                    </div>
                    <div class="item-description">
                        ${community.description || 'A vibrant community for sharing knowledge and connecting with fellow conservationists.'}
                    </div>
                    <div class="item-stats">
                        <div class="stats">
                            <div class="stat">
                                <span>👥</span>
                                <span>${counts.subscribers || 0} members</span>
                            </div>
                            <div class="stat">
                                <span>📝</span>
                                <span>${counts.posts || 0} posts</span>
                            </div>
                        </div>
                        <button class="action-btn" onclick="event.stopPropagation(); window.open('${API_BASE}/c/${community.name}', '_blank')">
                            Visit
                        </button>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // Fetch leaderboard data from badge API
        async function fetchLeaderboard(container) {
            try {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">🏆 Loading leaderboard...</div>';
                
                const response = await fetch('/api/badges/leaderboard');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const leaderboard = data.leaderboard || [];
                
                if (leaderboard.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">No leaderboard data available</div>';
                    return;
                }
                
                container.innerHTML = leaderboard.map((user, index) => `
                    <div class="leaderboard-item">
                        <div class="leaderboard-rank">${index + 1}</div>
                        <div class="leaderboard-avatar">${(user.display_name || user.username).charAt(0).toUpperCase()}</div>
                        <div class="leaderboard-info">
                            <div class="leaderboard-name">${user.display_name || user.username}</div>
                            <div class="leaderboard-specialty">${user.badge_count} badges • ${user.research_badges} research • ${user.community_badges} community</div>
                        </div>
                        <div class="leaderboard-score">⭐ ${user.total_karma}</div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error fetching leaderboard:', error);
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: #e74c3c;">⚠️ Failed to load leaderboard</div>';
            }
        }

        async function displayProfiles() {
            const container = document.getElementById('profiles-view');
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">🏆 Loading researchers...</div>';
            
            try {
                // Fetch leaderboard data to get real users with badges and karma
                const response = await fetch('/api/badges/leaderboard');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const researchers = data.leaderboard || [];
                
                if (researchers.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">No researchers found</div>';
                    return;
                }
                
                container.innerHTML = '';
                
                // Create profile cards for each researcher
                for (const researcher of researchers) {
                    try {
                        // Fetch detailed badge data for each researcher
                        const badgeResponse = await fetch(`/api/badges/user/${researcher.username}`);
                        const badgeData = badgeResponse.ok ? await badgeResponse.json() : { badges: [] };
                        const userBadges = badgeData.badges || [];
                        
                        const card = document.createElement('div');
                        card.className = 'user-profile';
                        
                        // Determine specialty based on badges
                        let specialty = 'Researcher';
                        if (researcher.research_badges > 0) specialty = 'Research Specialist';
                        if (researcher.technology_badges > 0) specialty = 'Technology Expert';
                        if (researcher.admin_badges > 0) specialty = 'HAAG Administrator';
                        if (researcher.community_badges > 0 && researcher.research_badges > 0) specialty = 'Community Research Leader';
                        
                        // Determine level based on karma and badges
                        let level = 'Beginner';
                        if (researcher.total_karma > 100) level = 'Intermediate';
                        if (researcher.total_karma > 300) level = 'Advanced';
                        if (researcher.total_karma > 500) level = 'Expert';
                        if (researcher.total_karma > 1000) level = 'Master';
                        
                        card.innerHTML = `
                            <div class="profile-header">
                                <div class="profile-avatar">${(researcher.display_name || researcher.username).charAt(0).toUpperCase()}</div>
                                <div class="profile-info">
                                    <h2>${researcher.display_name || researcher.username}</h2>
                                    <p><strong>${specialty}</strong></p>
                                    <p>Active researcher contributing to conservation technology and community science initiatives.</p>
                                    <span class="profile-level">Level: ${level}</span>
                                </div>
                            </div>
                            
                            <div class="badges-section">
                                <h3>🏆 Earned Badges</h3>
                                <div class="badges-grid">
                                    ${userBadges.length > 0 ? userBadges.map(badge => 
                                        `<div class="badge earned" title="${badge.badge_description}">
                                            <div class="badge-icon">${badge.badge_icon}</div>
                                            <div class="badge-name">${badge.badge_name}</div>
                                        </div>`
                                    ).join('') : '<div style="color: #666; font-style: italic; padding: 20px;">No badges yet</div>'}
                                </div>
                            </div>
                            
                            <div class="item-stats">
                                <div class="stats">
                                    <div class="stat">
                                        <span>⭐</span>
                                        <span>${researcher.total_karma} karma</span>
                                    </div>
                                    <div class="stat">
                                        <span>🏆</span>
                                        <span>${researcher.badge_count} badges</span>
                                    </div>
                                    <div class="stat">
                                        <span>👍</span>
                                        <span>${researcher.post_upvotes + researcher.comment_upvotes} upvotes</span>
                                    </div>
                                </div>
                                <button class="action-btn" onclick="window.open('/u/${researcher.username}', '_blank')">
                                    View Profile
                                </button>
                            </div>
                        `;
                        
                        container.appendChild(card);
                    } catch (error) {
                        console.error(`Error loading profile for ${researcher.username}:`, error);
                    }
                }
                
            } catch (error) {
                console.error('Error fetching researchers:', error);
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #e74c3c;">⚠️ Failed to load researchers</div>';
            }
        }

        function displaySidebar() {
            // Popular tags
            const tagsContainer = document.getElementById('popularTags');
            const shuffledTags = [...conservationTags].sort(() => 0.5 - Math.random()).slice(0, 12);
            tagsContainer.innerHTML = shuffledTags.map(tag => 
                `<span class="tag" onclick="filterByTag('${tag}')">#${tag}</span>`
            ).join('');
            
            // Leaderboard - fetch from API
            const leaderboardContainer = document.getElementById('leaderboard');
            fetchLeaderboard(leaderboardContainer);
            
            // Featured researchers  
            const featuredContainer = document.getElementById('featuredResearchers');
            featuredContainer.innerHTML = `
                <p><strong>🔬 Dima</strong> - Leading research in progress tracking methodologies</p>
                <p><strong>🎮 Leyang</strong> - Innovating gamification for scientific engagement</p>
            `;
        }

        function filterByTag(tag) {
            const searchInput = document.getElementById('searchInput');
            searchInput.value = `#${tag}`;
            performSearch();
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', performSearch);
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.item-card, .user-profile');
            
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                if (text.includes(query) || query === '') {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function showError(message) {
            const loading = document.getElementById('loading');
            loading.innerHTML = `
                <div style="color: #dc3545; font-size: 1.1rem; margin-bottom: 16px;">⚠️ ${message}</div>
                <button onclick="location.reload()" class="action-btn">Try Again</button>
            `;
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
