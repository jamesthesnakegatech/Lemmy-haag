worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker internal DNS IP
    resolver 127.0.0.11 valid=5s;

    server {
        listen 3001;
        listen 80;
        listen 443 ssl;
        server_name _;
        server_tokens off;
        
        ssl_certificate /etc/nginx/cert.pem;
        ssl_certificate_key /etc/nginx/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Enable compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

        # API and backend routes - proxy to Lemmy backend
        location ~ ^/(api|pictrs|feeds|nodeinfo|.well-known|version|sitemap.xml) {
            proxy_pass http://lemmy:8536;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # Frontend routes - proxy to Alexandrite with inline badge injection
        location / {
            proxy_pass http://alexandrite:3000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            
            # Enable response modification for inline script injection
            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter '</head>' '<script>console.log("🏆 HAAG Badge System loading on Alexandrite..."); window.haagBadgeSystemReady = true;</script></head>';
        }
    }
}